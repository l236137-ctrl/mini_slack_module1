services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mini_slack
      POSTGRES_PASSWORD: mini_slack
      POSTGRES_DB: mini_slack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_slack"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://mini_slack:mini_slack@db:5432/mini_slack
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
